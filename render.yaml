services:
  - type: worker
    name: nem-publisher
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_publisher.py
    autoDeploy: true

  - type: web
    name: nem-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port $PORT
    autoDeploy: true
