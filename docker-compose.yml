services:
  mosquitto:
    image: eclipse-mosquitto:2.0.21
    container_name: nem-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
